<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartRoom Appliance Monitor{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-microchip"></i>
                </div>
                <span class="sidebar-title">SmartRoom</span>
            </div>

            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('index') }}" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">
                    <i class="fas fa-edit"></i>
                    <span>Input Status</span>
                </a>
                <a href="{{ url_for('report') }}" class="nav-item {% if request.endpoint == 'report' %}active{% endif %}">
                    <i class="fas fa-chart-bar"></i>
                    <span>Report</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="system-status">
                    <div class="status-indicator"></div>
                    <span>System Online</span>
                </div>
                <p class="status-detail">Monitoring 4 rooms</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-container">
            <header class="main-header">
                <h2 class="header-title">Main Control Facility</h2>
                <span class="admin-badge">Admin Access</span>
            </header>

            <div class="main-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
